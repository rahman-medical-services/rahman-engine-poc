<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OutcomeLogic™ | Clinical Evidence Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --brand-navy: #0f172a;
            --brand-cyan: #0ea5e9;
            --primary: #1e293b;
            --bg-light: #f8fafc;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        /* --- SCREEN STYLES (App Interface) --- */
        body {
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            margin: 0; background: #e2e8f0; color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
            flex-direction: row;
        }
        
        #mobile-header {
            display: none; background: var(--brand-navy); color: white;
            padding: 15px 20px; align-items: center; justify-content: space-between;
            z-index: 50; flex-shrink: 0;
        }

        #sidebar {
            width: 300px; background: white; border-right: 1px solid #cbd5e1;
            display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px; background: var(--brand-navy); color: white;
            font-weight: 800; font-size: 1.2rem; letter-spacing: 0.5px;
        }

        #sidebar-nav { padding: 10px 0; display: flex; flex-direction: column; overflow-y: auto; flex-grow: 1; }

        .nav-btn {
            background: var(--bg-light); border: 1px solid #e2e8f0; padding: 10px 15px;
            border-radius: 8px; text-align: left; font-weight: 600; margin: 5px 20px;
            cursor: pointer; transition: 0.2s;
        }

        #main-content { flex: 1; padding: 30px; overflow-y: auto; width: 100%; box-sizing: border-box; }
        
        .widget-container {
            background: white; border-radius: 16px; padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 1000px; margin: 0 auto;
        }

        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        .chart-box { position: relative; height: 400px; width: 100%; }

        /* --- NATIVE PRINT ENGINE (A4 Logic) --- */
        @media print {
            /* 1. Hide every UI element except the clinical report */
            body, #sidebar, #mobile-header, #mobile-overlay, .nav-btn, .menu-btn, button {
                display: none !important;
            }

            /* 2. Reset layout to standard A4 page */
            body {
                background: white !important;
                display: block !important;
                overflow: visible !important;
                height: auto !important;
            }

            #main-content {
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
            }

            .widget-container {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
            }

            /* 3. Force vertical stacking (Ignore wide-screen monitor) */
            .grid {
                display: block !important;
            }

            .ee-sidebar {
                margin-bottom: 20px !important;
                background: #f8fafc !important; /* Keep light background for visibility */
                -webkit-print-color-adjust: exact;
                border-bottom: 1px solid #eee !important;
            }

            /* 4. Chart integrity: Prevent truncation */
            .chart-box {
                width: 100% !important;
                height: 450px !important;
                page-break-inside: avoid;
            }

            canvas {
                max-width: 100% !important;
                height: auto !important;
            }

            /* 5. Clean text for clinical documentation */
            .stat-main { color: black !important; }
            .pdf-disclaimer { border-top: 1px solid #eee !important; margin-top: 20px; }
        }

        /* Mobile specific Screen CSS */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            #mobile-header { display: flex; }
            #sidebar { position: fixed; transform: translateX(-100%); height: 100vh; }
            #sidebar.open { transform: translateX(0); }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="mobile-header">
        <div style="font-weight: 800;">OutcomeLogic™</div>
        <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
    </div>
    
    <div id="mobile-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="sidebar-header">OutcomeLogic™</div>
        <div id="sidebar-nav"></div>
        <div class="sidebar-footer" style="padding:20px; font-size:10px; border-top:1px solid #eee;">
            &copy; 2026 Rahman Medical Services Limited.
        </div>
    </div>

    <div id="main-content">
        <div id="content-mount">
            </div>
    </div>

    <script src="trials.js"></script>
    <script src="export-handler.js"></script>
    <script src="engine.js"></script>
</body>
</html>
